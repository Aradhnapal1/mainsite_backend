<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css">
    <script>
        (function () {
            var p = new URLSearchParams(window.location.search);
            window.MICROSITE_API_BASE = window.location.origin;
            window.MICROSITE_CONTEXT = { micrositeId: p.get("microsite_id") || "", slug: p.get("slug") || "", domain: p.get("domain") || "", currentPage: "cart" };
        })();
    </script>
    <style>
        :root { --ms-header-color:#1f2937; --ms-text-color:#fff; --ms-bg-color:#f9fafb; --ms-button-color:#2563eb; --ms-button-text-color:#fff; }
        body { background: var(--ms-bg-color); }
        .ms-header { background: var(--ms-header-color); color: var(--ms-text-color); }
        .ms-btn { background: var(--ms-button-color); color: var(--ms-button-text-color); border-color: var(--ms-button-color); }
        .ms-header-nav a { color: inherit; text-decoration: none; }
        .ms-cart-badge { position:absolute; top:-6px; right:-10px; min-width:18px; height:18px; border-radius:999px; background:var(--ms-button-color); color:#fff; font-size:11px; display:none; align-items:center; justify-content:center; }
        .ms-cart-badge.show { display:inline-flex; }
        .ms-cart-link { position:relative; }
    </style>
</head>
<body>
<header class="ms-header py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
        <a href="index.html" class="text-reset text-decoration-none ms-nav-home"><strong id="msSiteName">Microsite</strong></a>
        <nav class="d-flex gap-3 ms-header-nav flex-wrap">
            <a href="index.html">Home</a>
            <a href="login.html" id="msNavLogin">Login</a>
            <a href="register.html" id="msNavRegister">Register</a>
            <a href="cart.html" class="ms-cart-link">🛒<span class="ms-cart-badge" id="msCartBadge">0</span></a>
        </nav>
    </div>
</header>
<main class="container pb-5">
    <section class="card p-4 shadow-sm">
        <h2 class="mb-3">Cart</h2>
        <p id="msCartEmpty" class="text-muted" style="display:none;">Cart empty hai.</p>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Product</th><th>Qty</th><th>Total</th><th></th></tr></thead>
                <tbody id="msCartBody"></tbody>
            </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <strong>Grand Total: <span id="msCartTotal">₹0</span></strong>
            <a href="checkout.html" class="btn ms-btn">Go To Checkout</a>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js"></script>
<script src="_microsite-app.js"></script>
<script src="_runtime.js"></script>
</body>
</html>

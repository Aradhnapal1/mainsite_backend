<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Microsite Home</title>
    <meta name="description" content="Microsite page">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="microsite-layout.css">
    <link rel="stylesheet" href="microsite-products.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css">
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            window.MICROSITE_API_BASE = window.location.origin;
            window.MICROSITE_CONTEXT = {
                micrositeId: params.get("microsite_id") || "",
                slug: params.get("slug") || "",
                domain: params.get("domain") || "",
                currentPage: "home"
            };
        })();
    </script>
</head>
<body>
<header class="ms-header py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
        <a href="index.html" class="text-decoration-none d-flex align-items-center text-reset ms-nav-home">
            <img id="msLogo" class="ms-logo me-2" src="" alt="Logo" style="display:none;">
            <strong id="msSiteName">Microsite</strong>
        </a>
        <nav class="d-flex gap-3 ms-header-nav flex-wrap">
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
            <a href="login.html" id="msNavLogin">Login</a>
            <a href="register.html" id="msNavRegister">Register</a>
            <a href="cart.html" class="ms-cart-link" title="Cart">🛒<span class="ms-cart-badge" id="msCartBadge">0</span></a>
            <a href="checkout.html">Checkout</a>
            <a href="order.html">Order</a>
        </nav>
    </div>
</header>
<main class="container pb-5">
    <section class="mb-4">
        <img id="msBanner" class="ms-banner" src="" alt="Banner" style="display:none;">
    </section>
    <section class="card p-4 shadow-sm mb-4">
        <h1 id="msHeading">Microsite Heading</h1>
        <p id="msContent" class="mb-0">Loading microsite...</p>
    </section>
    <div class="ms-featured-wrap" id="msProductsSection">
        <div class="heading heading-center mb-3">
            <h2 class="title">FEATURED PRODUCTS</h2>
        </div>
        <div id="msProducts" class="row justify-content-center"></div>
        <p id="msProductsEmpty" class="ms-products-empty" style="display:none;">This microsite do not have products.</p>
    </div>
</main>
<footer class="ms-footer py-4 mt-4">
    <div class="container">
        <div class="row g-3">
            <div class="col-md-4">
                <h5 class="mb-1" id="msFooterName">Microsite</h5>
                <p class="mb-0" id="msFooterContent">-</p>
            </div>
            <div class="col-md-4">
                <p class="mb-1"><strong>Address:</strong> <span id="msAddress">-</span></p>
                <p class="mb-1"><strong>Email:</strong> <span id="msEmail">-</span></p>
                <p class="mb-0"><strong>Mobile:</strong> <span id="msMobile">-</span></p>
            </div>
            <div class="col-md-4 text-md-end">
                <small id="msDateRange">Validity: -</small>
            </div>
        </div>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js"></script>
<script src="_microsite-app.js"></script>
<script src="_runtime.js"></script>
</body>
</html>

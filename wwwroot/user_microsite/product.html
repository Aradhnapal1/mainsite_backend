<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Product Details</title>
    <meta name="description" content="Microsite page">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="microsite-layout.css">
    <link rel="stylesheet" href="microsite-products.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css">
    <script src="microsite-config.js"></script>
    <script src="_microsite-shell.js"></script>
</head>
<body data-ms-page="product"><header class="ms-header py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
        <a href="#" data-ms-nav="index" class="text-decoration-none d-flex align-items-center text-reset ms-nav-home">
            <img id="msLogo" class="ms-logo me-2" src="" alt="Logo" style="display:none;">
            <strong id="msSiteName">Microsite</strong>
        </a>
        <nav class="d-flex flex-wrap gap-2 gap-md-3 ms-header-nav">
            <a class="text-reset" href="#" data-ms-nav="index">Home</a>
            <a class="text-reset" href="#" data-ms-nav="contact">Contact</a>
            <a class="text-reset" href="#" data-ms-nav="login" id="msNavLogin">Login</a>
            <a class="text-reset" href="#" data-ms-nav="register" id="msNavRegister">Register</a>
            <a class="text-reset ms-cart-link" href="#" data-ms-nav="cart" title="Cart" aria-label="Cart">
                <i class="icon-shopping-cart"></i>
                <span class="ms-cart-badge" id="msCartBadge">0</span>
            </a>
            <a class="text-reset" href="#" data-ms-nav="checkout">Checkout</a>
            <a class="text-reset" href="#" data-ms-nav="order">Order</a>
        </nav>
    </div>
</header>
<main class="container pb-5">

<section class="card p-4 shadow-sm mb-4" id="msProductSection">
    <div class="row g-4">
        <div class="col-md-6"><img id="msProductImage" class="img-fluid rounded" src="" alt="Product" style="display:none;"></div>
        <div class="col-md-6">
            <p class="text-muted mb-1" id="msProductCategory">Product</p>
            <h1 class="h3" id="msProductTitle">Product</h1>
            <div class="h4 my-3" id="msProductPrice">₹0</div>
            <p class="mb-2"><strong>Availability:</strong> <span id="msProductStock">-</span></p>
            <p id="msProductDesc" class="text-muted">Loading product details...</p>
            <button type="button" class="btn ms-btn mt-2" id="msAddToCartBtn">Add to Cart</button>
            <a href="#" data-ms-nav="index" class="btn btn-link mt-2 d-inline-block">Back to Home</a>
        </div>
    </div>
    <p id="msProductEmpty" class="text-danger mt-3" style="display:none;">Product not found for this microsite.</p>
</section>
</main>
<footer class="ms-footer py-4 mt-4">
    <div class="container">
        <div class="row g-3">
            <div class="col-md-4">
                <h5 class="mb-1" id="msFooterName">Microsite</h5>
                <p class="mb-0" id="msFooterContent">Dynamic microsite footer content will show here.</p>
            </div>
            <div class="col-md-4">
                <p class="mb-1"><strong>Address:</strong> <span id="msAddress">-</span></p>
                <p class="mb-1"><strong>Email:</strong> <span id="msEmail">-</span></p>
                <p class="mb-0"><strong>Mobile:</strong> <span id="msMobile">-</span></p>
            </div>
            <div class="col-md-4 text-md-end">
                <small id="msDateRange">Validity: -</small>
            </div>
        </div>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js"></script>
<script src="_microsite-app.js"></script>
<script src="_runtime.js"></script>
</body>
</html>

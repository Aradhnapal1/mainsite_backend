<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="microsite-layout.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css">
    <script>
        (function () {
            var p = new URLSearchParams(window.location.search);
            window.MICROSITE_API_BASE = window.location.origin;
            window.MICROSITE_CONTEXT = { micrositeId: p.get("microsite_id") || "", slug: p.get("slug") || "", domain: p.get("domain") || "", currentPage: "product" };
        })();
    </script>
</head>
<body>
<header class="ms-header py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
        <a href="index.html" class="text-decoration-none d-flex align-items-center text-reset ms-nav-home">
            <img id="msLogo" class="ms-logo me-2" src="" alt="Logo" style="display:none;">
            <strong id="msSiteName">Microsite</strong>
        </a>
        <nav class="d-flex gap-3 ms-header-nav flex-wrap">
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
            <a href="login.html" id="msNavLogin">Login</a>
            <a href="register.html" id="msNavRegister">Register</a>
            <a href="cart.html" class="ms-cart-link">🛒<span class="ms-cart-badge" id="msCartBadge">0</span></a>
            <a href="checkout.html">Checkout</a>
            <a href="order.html">Order</a>
        </nav>
    </div>
</header>
<main class="container pb-5">
    <section class="card p-4 shadow-sm">
        <div class="row g-4">
            <div class="col-md-6"><img id="msProductImage" class="img-fluid rounded" src="" alt="Product" style="display:none;"></div>
            <div class="col-md-6">
                <p class="text-muted mb-1" id="msProductCategory">Product</p>
                <h1 class="h3" id="msProductTitle">Product</h1>
                <div class="h4 my-3" id="msProductPrice">₹0</div>
                <p class="mb-2"><strong>Availability:</strong> <span id="msProductStock">-</span></p>
                <p id="msProductDesc" class="text-muted">Loading...</p>
                <button type="button" class="btn ms-btn mt-2" id="msAddToCartBtn">Add to Cart</button>
                <a href="index.html" class="btn btn-link mt-2 d-block ms-nav-home">Back to Home</a>
            </div>
        </div>
        <p id="msProductEmpty" class="text-danger mt-3" style="display:none;">Product not found.</p>
    </section>
</main>
<footer class="ms-footer py-4 mt-4">
    <div class="container">
        <div class="row g-3">
            <div class="col-md-4"><h5 class="mb-1" id="msFooterName">Microsite</h5><p class="mb-0" id="msFooterContent">-</p></div>
            <div class="col-md-4">
                <p class="mb-1"><strong>Address:</strong> <span id="msAddress">-</span></p>
                <p class="mb-1"><strong>Email:</strong> <span id="msEmail">-</span></p>
                <p class="mb-0"><strong>Mobile:</strong> <span id="msMobile">-</span></p>
            </div>
            <div class="col-md-4 text-md-end"><small id="msDateRange">Validity: -</small></div>
        </div>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js"></script>
<script src="_microsite-app.js"></script>
<script src="_runtime.js"></script>
</body>
</html>
